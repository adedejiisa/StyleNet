<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STYLENET - Shop</title>
    <style>
        :root {
            --primary: #2C3E50;
            --secondary: #ECF0F1;
            --accent: #E74C3C;
            --text: #2C3E50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--secondary);
            color: var(--text);
            line-height: 1.6;
        }

        /* Header - Matching homepage */
        header {
            background: var(--primary);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -1px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .nav-links {
            display: flex;
            gap: 1.8rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .cart-icon {
            position: relative;
            color: white;
            font-size: 1.6rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .cart-icon:hover {
            transform: scale(1.15);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: white;
            font-size: 0.85rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* Page Title */
        .page-header {
            text-align: center;
            padding: 4rem 5% 2rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
        }

        .page-header h1 {
            font-size: clamp(2.2rem, 5vw, 3rem);
            font-weight: 800;
        }

        .page-header p {
            font-size: 1.25rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 1rem auto 0;
        }

        /* Products Grid */
        #products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            padding: 3rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .product:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .product img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product:hover img {
            transform: scale(1.08);
        }

        .product-info {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-info h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--primary);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-info .price {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--accent);
            margin: 0.8rem 0;
        }

        .add-to-cart {
            margin-top: auto;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .add-to-cart:hover {
            background: var(--accent);
            transform: translateY(-3px);
        }

        /* Success Toast */
        #success-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #27ae60;
            color: white;
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 10000;
            font-weight: 600;
            animation: toastIn 0.4s ease;
        }

        @keyframes toastIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 4rem;
            color: #777;
            font-size: 1.1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #products {
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 1.5rem;
                padding: 2rem 5%;
            }
            
            .product img {
                height: 220px;
            }
            
            header {
                padding: 1rem 5%;
            }
            
            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">STYLENET</div>
        
        <nav>
            <a href="index.html" class="nav-links">Home</a>
            <a href="product.html" class="nav-links">Shop</a>
            <a href="about.html" class="nav-links">About</a>
            <a href="cart.html" class="cart-icon">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </a>
        </nav>
    </header>

    <!-- Page Header -->
    <div class="page-header">
        <h1>Discover Our Collection</h1>
        <p>Premium fashion • Lightning-fast delivery • Unbeatable style</p>
    </div>

    <!-- Products Grid -->
    <div id="products"></div>

    <!-- Success Toast -->
    <div id="success-toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message"></span>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        // Update cart count
        function updateCartCount() {
            const countEl = document.getElementById("cartCount");
            countEl.textContent = cart.length;
        }

        // Show success toast
        function showToast(productName) {
            const toast = document.getElementById("success-toast");
            const message = document.getElementById("toast-message");
            
            message.textContent = `${productName} added to cart`;
            toast.style.display = "flex";
            
            setTimeout(() => {
                toast.style.display = "none";
            }, 2800);
        }

        // Add to cart
        function addToCart(product) {
            const existing = cart.find(item => item.id === product.id);
            
            if (existing) {
                existing.quantity = (existing.quantity || 1) + 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            localStorage.setItem("cart", JSON.stringify(cart));
            updateCartCount();
            showToast(product.title);
        }

        // Render products
        async function loadProducts() {
            const container = document.getElementById("products");
            container.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading premium styles...</div>`;

            try {
                const res = await fetch("https://api.escuelajs.co/api/v1/products");
                const products = await res.json();

                container.innerHTML = "";

                products.slice(0, 12).forEach((product, index) => {
                    const card = document.createElement("div");
                    card.className = "product";
                    card.style.animationDelay = `${index * 80}ms`;

                    const imageUrl = product.images && product.images[0] 
                        ? product.images[0] 
                        : "https://via.placeholder.com/300x300?text=STYLENET";

                    card.innerHTML = `
                        <img src="${imageUrl}" alt="${product.title}" 
                             onerror="this.src='https://via.placeholder.com/300x300?text=STYLENET'">
                        
                        <div class="product-info">
                            <h3>${product.title}</h3>
                            <div class="price">$${parseFloat(product.price).toFixed(2)}</div>
                            <button class="add-to-cart" onclick="addToCartFromId(${product.id})">
                                <i class="fas fa-cart-plus"></i> Add to Cart
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align:center; padding:4rem; color:var(--accent);">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem; margin-bottom:1rem;"></i>
                        <p>Unable to load products. Please try again later.</p>
                    </div>`;
            }
        }

        // Helper to find product by ID when button is clicked
        async function addToCartFromId(id) {
            try {
                const res = await fetch(`https://api.escuelajs.co/api/v1/products/${id}`);
                const product = await res.json();
                addToCart(product);
            } catch (e) {
                console.error("Could not fetch product details");
            }
        }

        // Initialize
        window.onload = () => {
            updateCartCount();
            loadProducts();
        };
    </script>
</body>
</html>
